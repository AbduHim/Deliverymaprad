<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نطاق التوصيل</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    height: 100vh; display: flex; flex-direction: column;
    background: #f5f5f0; overflow: hidden;
  }
  #map { flex: 1; z-index: 1; }

  .glass {
    background: rgba(255,255,255,0.93);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.15);
  }

  .top-panel {
    position: absolute; top: 12px; right: 12px; left: 12px;
    z-index: 1000; display: flex; gap: 8px; align-items: stretch;
    pointer-events: none;
  }
  .top-panel > * { pointer-events: auto; }

  .slider-card {
    flex: 1; min-width: 0; padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .slider-card label {
    font-size: 12px; font-weight: 700; color: #374151; white-space: nowrap;
  }
  .slider-wrap {
    flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0;
  }
  input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px; background: #d1d5db; outline: none; min-width: 60px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: #0f766e; border: 2px solid white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25); cursor: pointer;
  }
  .km-badge {
    background: #0f766e; color: white; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 700; min-width: 42px; text-align: center; white-space: nowrap;
  }

  .icon-btn {
    width: 38px; height: 38px; border-radius: 10px; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.15s; flex-shrink: 0;
  }
  .icon-btn:hover { transform: scale(1.05); }
  .icon-btn.active-add {
    background: #dc2626 !important; color: white !important;
    animation: glow-red 1.5s infinite;
  }
  @keyframes glow-red {
    0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(220,38,38,0); }
  }
  .icon-btn.active-sat { background: #1e40af !important; color: white !important; }

  .bottom-panel {
    position: absolute; bottom: 12px; right: 12px; left: 12px;
    z-index: 1000; pointer-events: none;
  }
  .bottom-panel > * { pointer-events: auto; }

  .points-bar {
    padding: 8px 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .points-bar .hint { font-size: 11px; color: #6b7280; }

  .point-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; cursor: pointer;
    transition: all 0.15s; border: 2px solid rgba(255,255,255,0.6);
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }
  .point-chip:hover { filter: brightness(0.9); }
  .point-chip .x {
    width: 14px; height: 14px; border-radius: 50%;
    background: rgba(0,0,0,0.15); color: white; border: none;
    font-size: 9px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-family: inherit;
  }
  .point-chip .x:hover { background: rgba(0,0,0,0.35); }

  .overlap-tag {
    position: relative;
    background: rgba(0,0,0,0.82); border: 2px solid #fbbf24;
    border-radius: 8px; padding: 5px 30px 5px 10px;
    font-family: 'Tajawal', sans-serif;
    font-size: 11px; font-weight: 700; color: #fde68a;
    white-space: nowrap; box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    text-align: center; line-height: 1.5;
  }
  .overlap-close {
    position: absolute; top: 50%; left: 6px; transform: translateY(-50%);
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: none;
    color: #fde68a; font-size: 13px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-family: inherit; line-height: 1; transition: background 0.15s;
  }
  .overlap-close:hover { background: rgba(255,255,255,0.35); }

  .leaflet-popup-content-wrapper {
    border-radius: 10px !important; font-family: 'Tajawal', sans-serif !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
  }
  .leaflet-popup-content {
    margin: 10px 14px !important; font-size: 13px !important;
    text-align: center !important; direction: rtl !important;
  }
  .p-title { font-weight: 800; font-size: 14px; margin-bottom: 2px; }
  .p-sub { font-size: 11px; color: #6b7280; }

  .leaflet-control-zoom { display: none !important; }

  .custom-zoom {
    position: absolute; bottom: 70px; left: 12px;
    z-index: 1000; display: flex; flex-direction: column; gap: 2px;
  }
  .zoom-btn {
    width: 36px; height: 36px; border: none; cursor: pointer;
    font-size: 18px; font-weight: 700; color: #374151;
    display: flex; align-items: center; justify-content: center; transition: background 0.15s;
  }
  .zoom-btn:first-child { border-radius: 10px 10px 0 0; }
  .zoom-btn:last-child { border-radius: 0 0 10px 10px; }
  .zoom-btn:hover { background: rgba(230,230,230,0.95) !important; }

  .add-mode #map, .add-mode .leaflet-container, .add-mode .leaflet-grab { cursor: crosshair !important; }
</style>
</head>
<body>

<div class="top-panel">
  <div class="glass slider-card">
    <label>نصف القطر:</label>
    <div class="slider-wrap">
      <input type="range" id="radiusSlider" min="1" max="30" value="10" step="0.5">
      <span class="km-badge" id="kmBadge">10 كم</span>
    </div>
  </div>
  <button class="icon-btn glass" id="addBtn" onclick="toggleAdd()" title="إضافة نقطة">➕</button>
  <button class="icon-btn glass" id="satBtn" onclick="toggleSat()" title="قمر صناعي">🛰️</button>
  <button class="icon-btn glass" id="clearBtn" onclick="clearAll()" title="مسح الكل">🗑️</button>
</div>

<div id="map"></div>

<div class="custom-zoom">
  <button class="zoom-btn glass" onclick="smoothZoom(1)">+</button>
  <button class="zoom-btn glass" onclick="smoothZoom(-1)">−</button>
</div>

<div class="bottom-panel">
  <div class="points-bar glass" id="pointsBar">
    <span class="hint">اضغط ➕ ثم انقر على الخريطة لإضافة نقطة</span>
  </div>
</div>

<script>
  const map = L.map('map', {
    zoomControl: false, zoomSnap: 0.25, zoomDelta: 0.5,
    wheelDebounceTime: 80, wheelPxPerZoomLevel: 120
  }).setView([24.485, 39.574], 13);

  // ── Google Maps street view (same data as OSM, no referrer issues) ──
  const streets = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
    maxZoom: 20
  }).addTo(map);

  const satTiles = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 20 });
  const satLabels = L.tileLayer('https://mt1.google.com/vt/lyrs=h&x={x}&y={y}&z={z}', { maxZoom: 20 });
  let isSat = false;

  function toggleSat() {
    const btn = document.getElementById('satBtn');
    if (isSat) {
      map.removeLayer(satTiles); map.removeLayer(satLabels); streets.addTo(map);
      btn.classList.remove('active-sat');
      points.forEach(p => { p.marker.setIcon(mkIcon(p.color, false)); updateCircleStyle(p, false); });
    } else {
      map.removeLayer(streets); satTiles.addTo(map); satLabels.addTo(map);
      btn.classList.add('active-sat');
      points.forEach(p => { p.marker.setIcon(mkIcon(p.color, true)); updateCircleStyle(p, true); });
    }
    isSat = !isSat;
  }

  function smoothZoom(d) { map.setZoom(map.getZoom() + d * 0.5, { animate: true }); }

  const COLORS = [
    { main: '#0f766e', fill: '#14b8a6', neon: '#00FF88', neonFill: '#00FF88', chipBg: '#ccfbf1', chipText: '#065f46' },
    { main: '#dc2626', fill: '#f87171', neon: '#FF2244', neonFill: '#FF2244', chipBg: '#fee2e2', chipText: '#991b1b' },
    { main: '#2563eb', fill: '#60a5fa', neon: '#00BBFF', neonFill: '#00BBFF', chipBg: '#dbeafe', chipText: '#1e40af' },
    { main: '#d97706', fill: '#fbbf24', neon: '#FFEE00', neonFill: '#FFEE00', chipBg: '#fef3c7', chipText: '#92400e' },
    { main: '#7c3aed', fill: '#a78bfa', neon: '#DD66FF', neonFill: '#DD66FF', chipBg: '#ede9fe', chipText: '#5b21b6' },
    { main: '#db2777', fill: '#f472b6', neon: '#FF55CC', neonFill: '#FF55CC', chipBg: '#fce7f3', chipText: '#9d174d' },
  ];

  let points = [];
  let addMode = false;
  let radiusKm = 10;
  let overlapMarkers = [];

  function toggleAdd() {
    addMode = !addMode;
    const btn = document.getElementById('addBtn');
    if (addMode) {
      btn.classList.add('active-add'); btn.textContent = '✋';
      document.body.classList.add('add-mode');
    } else exitAdd();
  }
  function exitAdd() {
    addMode = false;
    document.getElementById('addBtn').classList.remove('active-add');
    document.getElementById('addBtn').textContent = '➕';
    document.body.classList.remove('add-mode');
  }

  function mkIcon(c, satellite) {
    const color = satellite ? c.neon : c.main;
    const shadow = satellite
      ? `0 0 16px ${c.neon}, 0 0 8px ${c.neon}, 0 0 32px ${c.neon}`
      : `0 2px 6px rgba(0,0,0,0.3)`;
    const innerBorder = satellite ? `3px solid white` : '3px solid white';
    const pingColor = satellite ? c.neon : c.main;

    return L.divIcon({
      html: `<div style="width:32px;height:32px;position:relative">
        <div style="position:absolute;inset:0;background:${pingColor};border-radius:50%;opacity:0.4;animation:ping 2s cubic-bezier(0,0,0.2,1) infinite"></div>
        ${satellite ? `<div style="position:absolute;inset:1px;border:2px solid ${c.neon};border-radius:50%;opacity:0.6"></div>` : ''}
        <div style="position:absolute;inset:5px;background:${color};border:${innerBorder};border-radius:50%;box-shadow:${shadow}"></div>
      </div>
      <style>@keyframes ping{0%{transform:scale(1);opacity:0.4}75%,100%{transform:scale(2.5);opacity:0}}</style>`,
      iconSize: [32, 32], iconAnchor: [16, 16], className: ''
    });
  }

  function updateCircleStyle(pt, satellite) {
    if (satellite) {
      pt.circle.setStyle({ color: pt.color.neon, weight: 3, opacity: 0.9, fillColor: pt.color.neonFill, fillOpacity: 0.15, dashArray: '10, 7' });
      pt.outerCircle.setStyle({ color: pt.color.neon, weight: 5, opacity: 0.3 });
    } else {
      pt.circle.setStyle({ color: pt.color.main, weight: 2.5, opacity: 0.75, fillColor: pt.color.fill, fillOpacity: 0.1, dashArray: '10, 7' });
      pt.outerCircle.setStyle({ color: 'white', weight: 4, opacity: 0.25 });
    }
  }

  function addPoint(ll) {
    if (points.length >= COLORS.length) return;
    const i = points.length;
    const c = COLORS[i];

    const marker = L.marker(ll, { icon: mkIcon(c, isSat), draggable: true }).addTo(map);
    const outerCircle = L.circle(ll, {
      radius: radiusKm * 1000,
      color: isSat ? c.neon : 'white', weight: isSat ? 5 : 4, opacity: isSat ? 0.3 : 0.25, fill: false
    }).addTo(map);
    const circle = L.circle(ll, {
      radius: radiusKm * 1000,
      color: isSat ? c.neon : c.main, weight: isSat ? 3 : 2.5, opacity: isSat ? 0.9 : 0.75,
      fillColor: isSat ? c.neonFill : c.fill, fillOpacity: isSat ? 0.15 : 0.1, dashArray: '10, 7'
    }).addTo(map);

    const pt = { marker, circle, outerCircle, color: c, ll };
    points.push(pt);
    marker.bindPopup(popupHTML(i));

    marker.on('drag', e => {
      const p = e.target.getLatLng();
      circle.setLatLng(p); outerCircle.setLatLng(p); pt.ll = p;
      computeOverlaps();
    });
    marker.on('dragend', () => fitAll());
    computeOverlaps(); refreshUI(); fitAll(); exitAdd();
  }

  function popupHTML(i) {
    const a = (Math.PI * radiusKm * radiusKm).toFixed(1);
    return `<div class="p-title" style="color:${COLORS[i%COLORS.length].main}">📍 نقطة ${i+1}</div>
            <div class="p-sub">نطاق: ${radiusKm} كم — مساحة: ${a} كم²</div>`;
  }

  function removePoint(idx) {
    map.removeLayer(points[idx].marker); map.removeLayer(points[idx].circle); map.removeLayer(points[idx].outerCircle);
    points.splice(idx, 1);
    points.forEach((p, i) => {
      p.color = COLORS[i]; p.marker.setIcon(mkIcon(p.color, isSat));
      updateCircleStyle(p, isSat); p.marker.setPopupContent(popupHTML(i));
    });
    computeOverlaps(); refreshUI();
    points.length ? fitAll() : map.setView([24.485, 39.574], 13);
  }

  function clearAll() {
    points.forEach(p => { map.removeLayer(p.marker); map.removeLayer(p.circle); map.removeLayer(p.outerCircle); });
    points = []; clearOverlaps(); refreshUI(); map.setView([24.485, 39.574], 13);
  }

  function fitAll() {
    if (!points.length) return;
    map.fitBounds(L.featureGroup(points.map(p => p.circle)).getBounds(), { padding: [50, 50], maxZoom: 15 });
  }

  function clearOverlaps() { overlapMarkers.forEach(m => map.removeLayer(m)); overlapMarkers = []; }

  function computeOverlaps() {
    clearOverlaps();
    if (points.length < 2) return;
    for (let i = 0; i < points.length; i++) {
      for (let j = i + 1; j < points.length; j++) {
        const d = points[i].marker.getLatLng().distanceTo(points[j].marker.getLatLng()) / 1000;
        if (d < radiusKm * 2) {
          const ov = radiusKm * 2 - d;
          const mLat = (points[i].marker.getLatLng().lat + points[j].marker.getLatLng().lat) / 2;
          const mLng = (points[i].marker.getLatLng().lng + points[j].marker.getLatLng().lng) / 2;
          const tagId = `ov_${i}_${j}_${Date.now()}`;
          const m = L.marker([mLat, mLng], {
            icon: L.divIcon({
              html: `<div class="overlap-tag" id="${tagId}">
                ⚡ تداخل ${ov.toFixed(1)} كم — مسافة: ${d.toFixed(1)} كم
                <button class="overlap-close" onclick="closeOverlap('${tagId}')">✕</button>
              </div>`,
              iconSize: [250, 34], iconAnchor: [125, 17], className: ''
            }), interactive: true
          }).addTo(map);
          m._tagId = tagId;
          overlapMarkers.push(m);
        }
      }
    }
  }

  window.closeOverlap = function(tagId) {
    const idx = overlapMarkers.findIndex(m => m._tagId === tagId);
    if (idx !== -1) { map.removeLayer(overlapMarkers[idx]); overlapMarkers.splice(idx, 1); }
  };

  function refreshUI() {
    const bar = document.getElementById('pointsBar');
    if (!points.length) {
      bar.innerHTML = '<span class="hint">اضغط ➕ ثم انقر على الخريطة لإضافة نقطة</span>';
      return;
    }
    let h = points.map((p, i) =>
      `<span class="point-chip" style="background:${p.color.chipBg};color:${p.color.chipText}"
            onclick="points[${i}].marker.openPopup();map.panTo(points[${i}].marker.getLatLng())">
        ● نقطة ${i+1}
        <button class="x" onclick="event.stopPropagation();removePoint(${i})">✕</button>
      </span>`
    ).join('');
    h += `<span class="hint" style="margin-right:auto">نصف القطر: ${radiusKm} كم</span>`;
    bar.innerHTML = h;
  }

  map.on('click', e => { if (addMode) addPoint(e.latlng); });

  document.getElementById('radiusSlider').addEventListener('input', function() {
    radiusKm = parseFloat(this.value);
    document.getElementById('kmBadge').textContent = `${radiusKm} كم`;
    points.forEach((p, i) => {
      p.circle.setRadius(radiusKm * 1000);
      p.outerCircle.setRadius(radiusKm * 1000);
      p.marker.setPopupContent(popupHTML(i));
    });
    computeOverlaps(); refreshUI();
    if (points.length) fitAll();
  });
</script>
</body>
</html>
